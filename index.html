<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .cart-container {
            width: 70%;
            margin: auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.2);
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        .product-details {
            flex: 2;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
        }

        .price {
            color: green;
            margin-top: 5px;
        }

        .actions {
            flex: 1;
            text-align: right;
        }

        input.qty {
            width: 50px;
            padding: 5px;
            margin-right: 10px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove {
            background-color: #ff4d4d;
            color: white;
        }

        .checkout {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background-color: #28a745;
            color: white;
            font-size: 18px;
        }

        .checkout:hover {
            background-color: #218838;
        }

    </style>
</head>

<body>

<h2>🛒 Your Shopping Cart</h2>

<div class="cart-container">

    <!-- ITEM 1 -->
    <div class="cart-item">
        <div class="product-details">
            <h3 class="product-name">iPhone 15</h3>
            <span class="price">₹80,000</span>
        </div>

        <div class="actions">
            <input type="number" class="qty" value="1">
            <button class="remove">Remove</button>
        </div>
    </div>

    <!-- ITEM 2 -->
    <div class="cart-item">
        <div class="product-details">
            <h3 class="product-name">Samsung S24</h3>
            <span class="price">₹70,000</span>
        </div>

        <div class="actions">
            <input type="number" class="qty" value="2">
            <button class="remove">Remove</button>
        </div>
    </div>

    <!-- ITEM 3 -->
    <div class="cart-item">
        <div class="product-details">
            <h3 class="product-name">OnePlus 12</h3>
            <span class="price">₹60,000</span>
        </div>

        <div class="actions">
            <input type="number" class="qty" value="1">
            <button class="remove">Remove</button>
        </div>
    </div>

    <button class="checkout">Proceed to Checkout</button>

</div>

</body>
</html>
